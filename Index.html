<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK-R65 Hospitalario</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0b1220;
    color: #e6f1ff;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 950px;
    margin: auto;
    background: #111a2e;
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    color: #00ffd5;
    margin-bottom: 20px;
}

.section {
    background: #0f1b33;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid #1f2d4a;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: 600;
    color: #a9c1ff;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #2b3c5f;
    background: #0b1220;
    color: #e6f1ff;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.primary {
    background: linear-gradient(90deg,#00ffd5,#00a3ff);
    color: #001018;
}

.secondary {
    background: #1c2a4a;
    color: #e6f1ff;
    border: 1px solid #2b3c5f;
}

.result {
    margin-top: 15px;
    padding: 15px;
    background: #0b1220;
    border-left: 4px solid #00ffd5;
    border-radius: 10px;
}

.card {
    background: #0b1220;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    border: 1px solid #1f2d4a;
}

#userInfo {
    margin-top: 10px;
    font-size: 14px;
    color: #7aa2ff;
}
</style>
</head>

<body>

<div class="container">

<h1>IPK-R65 Hospitalario</h1>

<!-- LOGIN -->
<div class="section">
<h3>🔐 Acceso clínico</h3>

<input id="email" placeholder="Correo institucional">
<input id="pass" type="password" placeholder="Contraseña">

<button class="primary" onclick="login()">Ingresar</button>
<button class="secondary" onclick="logout()">Cerrar sesión</button>

<div id="userInfo"></div>
</div>

<!-- PACIENTE -->
<div class="section">
<h3>🧑‍⚕️ Paciente</h3>
<input id="paciente" placeholder="ID paciente (ej: HSJ-001)">
</div>

<!-- VARIABLES -->
<div class="section">
<h3>📊 Variables clínicas</h3>

<label>Estabilidad hemodinámica</label>
<select id="hemo">
<option value="no">No estable</option>
<option value="si">Estable</option>
</select>

<label>Acepta intervención</label>
<select id="acepta">
<option value="no">No</option>
<option value="si">Sí</option>
</select>

<label>Edad funcional</label>
<select id="edad">
<option value="0">≥65</option>
<option value="5"><65</option>
</select>

<label>Reserva funcional</label>
<select id="v1">
<option value="0">Severa</option>
<option value="5">Parcial</option>
<option value="10">Independiente</option>
</select>

<label>Complejidad</label>
<select id="v2">
<option value="0">Alta</option>
<option value="5">Media</option>
<option value="10">Baja</option>
</select>

<label>Red de apoyo</label>
<select id="v3">
<option value="0">Sin apoyo</option>
<option value="3">Parcial</option>
<option value="5">Fuerte</option>
</select>

<label>Motivación</label>
<select id="v4">
<option value="0">Baja</option>
<option value="3">Variable</option>
<option value="5">Alta</option>
</select>
</div>

<!-- JUICIO CLÍNICO -->
<div class="section">
<h3>🧠 Juicio kinésico</h3>

<label>Edad funcional clínica</label>
<select id="j1"><option value="0">Baja</option><option value="2">Media</option><option value="4">Alta</option></select>

<label>Motivación observada</label>
<select id="j2"><option value="0">Nula</option><option value="2">Parcial</option><option value="4">Alta</option></select>

<label>Adherencia</label>
<select id="j3"><option value="0">Baja</option><option value="2">Media</option><option value="4">Alta</option></select>

<label>Apoyo cuidador</label>
<select id="j4"><option value="0">Ausente</option><option value="2">Irregular</option><option value="4">Constante</option></select>

<label>Tolerancia esfuerzo</label>
<select id="j5"><option value="0">Baja</option><option value="2">Moderada</option><option value="4">Alta</option></select>
</div>

<!-- ACCIONES -->
<div class="section">
<button class="primary" onclick="evaluar()">Evaluar y guardar</button>
<button class="secondary" onclick="verHistorial()">Ver historial</button>
<button class="secondary" onclick="exportarExcel()">Exportar Excel</button>
</div>

<div class="result" id="res"></div>
<div class="section" id="historial"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "irat-5-evaluaciones.firebaseapp.com",
projectId: "irat-5-evaluaciones",
storageBucket: "irat-5-evaluaciones.appspot.com",
messagingSenderId: "487279274410",
appId: "1:487279274410:web:146e9c35a0bf795c5423d3"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.db = db;
window.fb = {
signInWithEmailAndPassword,
onAuthStateChanged,
signOut,
collection,
addDoc,
getDocs,
query,
orderBy
};

</script>

<!-- LOGIC -->
<script>

let user = null;

/* AUTH */
async function login(){
try{
await window.fb.signInWithEmailAndPassword(
window.auth,
email.value,
pass.value
);
}catch(e){
alert("Error login");
}
}

async function logout(){
await window.fb.signOut(window.auth);
}

window.fb.onAuthStateChanged(window.auth,(u)=>{
user = u;
document.getElementById("userInfo").innerHTML =
u ? "👤 " + u.email : "Sin sesión";
});

/* GUARDAR */
async function guardar(data){
if(!user){
alert("Debe iniciar sesión");
return;
}

await window.fb.addDoc(
window.fb.collection(window.db,"evaluaciones_ipk"),
{
...data,
evaluadorUID:user.uid,
evaluadorEmail:user.email
}
);
}

/* EVALUAR */
async function evaluar(){

if(hemo.value==="no"){
res.innerHTML="🚫 No estable";
return;
}

if(acepta.value==="no"){
res.innerHTML="❌ No acepta intervención";
return;
}

let total =
+edad.value + +v1.value + +v2.value + +v3.value + +v4.value +
+j1.value + +j2.value + +j3.value + +j4.value + +j5.value;

let soporte = +v3.value + +j4.value + +v4.value;

let interpretacion =
total>=40 ? "🟢 Alto beneficio" :
total>=25 ? "🟡 Intermedio" :
soporte>=6 ? "🔴 Preventivo" :
"⚫ Bajo global";

let data = {
paciente:paciente.value || "sin-id",
fecha:new Date().toISOString(),
total,
interpretacion,
soporte
};

await guardar(data);

res.innerHTML = `<b>${interpretacion}</b><br>Puntaje: ${total}`;
}

/* HISTORIAL */
async function verHistorial(){

let q = window.fb.query(
window.fb.collection(window.db,"evaluaciones_ipk"),
window.fb.orderBy("fecha","desc")
);

let snap = await window.fb.getDocs(q);

let html = "<h3>Historial clínico</h3>";

snap.forEach(d=>{
let h=d.data();
html+=`
<div class="card">
<b>${h.paciente}</b><br>
${new Date(h.fecha).toLocaleString()}<br>
${h.total} - ${h.interpretacion}<br>
${h.evaluadorEmail}
</div>`;
});

historial.innerHTML = html;
}

/* EXCEL */
async function exportarExcel(){

let snap = await window.fb.getDocs(
window.fb.collection(window.db,"evaluaciones_ipk")
);

let data = snap.docs.map(d=>({
Paciente:d.data().paciente,
Fecha:new Date(d.data().fecha).toLocaleString(),
Puntaje:d.data().total,
Interpretacion:d.data().interpretacion,
Soporte:d.data().soporte,
Evaluador:d.data().evaluadorEmail
}));

let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"IPK_R65");

XLSX.writeFile(wb,"IPK_R65_hospital.xlsx");
}

</script>

</body>
</html>
