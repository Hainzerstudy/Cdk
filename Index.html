<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK-R65 Hospitalario - Escala Recalibrada (Menos Intermedios)</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    background: #0b1220;
    color: #e6f1ff;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 1200px;
    margin: auto;
    background: #111a2e;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 12px 35px rgba(0,0,0,0.6);
}

h1 {
    text-align: center;
    color: #00ffd5;
    margin-bottom: 10px;
    font-size: 1.8rem;
}

.sub {
    text-align: center;
    color: #8aa2e0;
    margin-bottom: 25px;
    font-size: 0.9rem;
}

.section {
    background: #0f1b33;
    padding: 18px;
    border-radius: 16px;
    margin-bottom: 20px;
    border: 1px solid #1f2d4a;
}

.section h3 {
    margin-top: 0;
    margin-bottom: 15px;
    color: #00ffd5;
    display: flex;
    align-items: center;
    gap: 8px;
}

label {
    display: block;
    margin-top: 14px;
    font-weight: 700;
    color: #c2d6ff;
    font-size: 0.95rem;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 12px;
    border: 1px solid #2b3c5f;
    background: #0b1220;
    color: #e6f1ff;
    font-size: 0.85rem;
    cursor: pointer;
}

select:hover, input:hover {
    border-color: #00ffd5;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border-radius: 40px;
    border: none;
    font-weight: bold;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
}

button:active {
    transform: scale(0.98);
}

.primary {
    background: linear-gradient(90deg, #00ffd5, #00a3ff);
    color: #001018;
    box-shadow: 0 4px 12px rgba(0,255,213,0.2);
}

.secondary {
    background: #1c2a4a;
    color: #e6f1ff;
    border: 1px solid #2b3c5f;
}

.result {
    margin-top: 15px;
    padding: 18px;
    background: #0a1122;
    border-left: 5px solid #00ffd5;
    border-radius: 14px;
    font-weight: 500;
}

.card {
    background: #0b1220;
    padding: 14px;
    border-radius: 14px;
    margin-bottom: 12px;
    border: 1px solid #253454;
}

.historial-title {
    font-size: 1.4rem;
    margin-top: 20px;
    color: #00ffd5;
    border-bottom: 1px solid #253454;
    padding-bottom: 8px;
}

.warning-badge {
    background: #ffb74d;
    color: #1a1a2e;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: bold;
    margin-left: 8px;
}

.flex-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
.flex-buttons button {
    flex: 1;
}

.observation-note {
    background: #1a2744;
    padding: 10px;
    border-radius: 10px;
    margin-top: 12px;
    font-size: 0.85rem;
    border-left: 3px solid #ffb74d;
}

.consejos-container {
    background: #0a1a2f;
    border-radius: 14px;
    padding: 15px;
    margin-top: 15px;
    border: 1px solid #2a3a60;
}

.consejos-container h4 {
    color: #00ffd5;
    margin: 0 0 12px 0;
    font-size: 1rem;
}

.consejo-item {
    background: #0f1b33;
    margin: 8px 0;
    padding: 10px 12px;
    border-radius: 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 0.85rem;
    border-left: 3px solid #00ffd5;
}

.consejo-icon {
    font-size: 1.1rem;
    min-width: 24px;
}
</style>
</head>

<body>

<div class="container">
<h1>🏥 IPK-R65 Hospitalario</h1>
<div class="sub">Escala recalibrada | Puntajes más equilibrados | 6 consejos personalizados</div>

<!-- PACIENTE -->
<div class="section">
<h3>🧑‍⚕️ Identificación del paciente</h3>
<input id="paciente" placeholder="Ej: HSJ-042 / Nombre o código" autocomplete="off">
</div>

<!-- VARIABLES CLÍNICAS OBJETIVAS - CON NUEVOS PUNTAJES -->
<div class="section">
<h3>📊 Variables clínicas basales</h3>

<label>🔻 Estabilidad hemodinámica</label>
<select id="hemo">
<option value="no">❌ No estable — Inestabilidad de signos vitales, no movilizar</option>
<option value="si">✅ Estable — Permite movilización progresiva</option>
</select>

<label>🤝 Capacidad de consentir</label>
<select id="acepta">
<option value="si">👍 Sí puede consentir</option>
<option value="no_puede">🧠 No puede consentir (se evalúa igual)</option>
<option value="no">🚫 No acepta intervención</option>
</select>

<label>📅 Edad funcional (0 o 5 pts)</label>
<select id="edad">
<option value="0">👴 ≥65 años — Mayor fragilidad (0 pts)</option>
<option value="5">🧑 &lt;65 años — Menor riesgo (5 pts)</option>
</select>

<label>💪 Reserva funcional (0, 6 o 12 pts)</label>
<select id="v1">
<option value="0">🦽 Severa — Dependiente total (0 pts)</option>
<option value="6">🚶 Parcial — Requiere ayuda (6 pts)</option>
<option value="12">🏃 Independiente — Alta reserva (12 pts)</option>
</select>

<label>⚙️ Complejidad clínica (0, 6 o 12 pts)</label>
<select id="v2">
<option value="0">🔴 Alta — Múltiples patologías descompensadas (0 pts)</option>
<option value="6">🟡 Media — Comorbilidades controladas (6 pts)</option>
<option value="12">🟢 Baja — Buena estabilidad (12 pts)</option>
</select>

<label>👨‍👩‍👧 Red de apoyo (0, 4 u 8 pts)</label>
<select id="v3">
<option value="0">🏚️ Sin apoyo — Vive solo, sin cuidador (0 pts)</option>
<option value="4">🤝 Parcial — Ayuda intermitente (4 pts)</option>
<option value="8">🏠 Fuerte — Apoyo continuo (8 pts)</option>
</select>

<label>🎯 Motivación basal (0, 4 u 8 pts)</label>
<select id="v4">
<option value="0">😞 Baja — Poco interés (0 pts)</option>
<option value="4">🔄 Variable — A veces colabora (4 pts)</option>
<option value="8">🔥 Alta — Participa activamente (8 pts)</option>
<option value="0">🚫 No puede colaborar (0 pts)</option>
</select>
</div>

<!-- JUICIO CLÍNICO - CON NUEVOS PUNTAJES -->
<div class="section">
<h3>🧠 Juicio kinésico (evaluador)</h3>

<label>🧓 Edad funcional clínica (0, 3 o 6 pts)</label>
<select id="j1">
<option value="0">📉 Baja — Se comporta como más frágil (0 pts)</option>
<option value="3">📊 Media — Acorde a su edad (3 pts)</option>
<option value="6">📈 Alta — Vitalidad superior (6 pts)</option>
</select>

<label>💡 Motivación observada (0, 3 o 6 pts)</label>
<select id="j2">
<option value="0">🪨 Nula — Total pasividad (0 pts)</option>
<option value="3">⚡ Parcial — Reacciona a estímulos (3 pts)</option>
<option value="6">✨ Alta — Entusiasmo evidente (6 pts)</option>
<option value="0">❌ No puede colaborar (0 pts)</option>
</select>

<label>🔄 Adherencia a indicaciones (0, 3 o 6 pts)</label>
<select id="j3">
<option value="0">⚠️ Baja — No sigue instrucciones (0 pts)</option>
<option value="3">📋 Media — Sigue con ayuda (3 pts)</option>
<option value="6">🧠 Alta — Realiza correctamente (6 pts)</option>
<option value="0">🚫 No puede colaborar (0 pts)</option>
</select>

<label>🤲 Apoyo del cuidador (0, 3 o 6 pts)</label>
<select id="j4">
<option value="0">❌ Ausente — No hay cuidador (0 pts)</option>
<option value="3">🕒 Irregular — Apoyo esporádico (3 pts)</option>
<option value="6">✅ Constante — Cuidador presente (6 pts)</option>
</select>

<label>🏋️ Tolerancia al esfuerzo (0, 3 o 6 pts)</label>
<select id="j5">
<option value="0">🪫 Baja — Fatiga extrema (0 pts)</option>
<option value="3">⚖️ Moderada — Completa con pausas (3 pts)</option>
<option value="6">⚡ Alta — Buen desempeño (6 pts)</option>
<option value="0">⛔ No puede colaborar (0 pts)</option>
</select>
</div>

<!-- BOTONES -->
<div class="section">
<div class="flex-buttons">
<button class="primary" onclick="evaluar()">📝 Evaluar y guardar</button>
<button class="secondary" onclick="verHistorial()">📋 Ver historial</button>
<button class="secondary" onclick="exportarExcel()">📎 Exportar Excel</button>
<button class="secondary" onclick="limpiarHistorial()">🗑️ Limpiar todo</button>
</div>
</div>

<div class="result" id="res">
💡 Complete los datos clínicos y presione "Evaluar".
</div>
<div id="historial"></div>

</div>

<script>
// ========== ALMACENAMIENTO LOCAL ==========
let historialEvaluaciones = [];

function cargarHistorialLocal() {
    const guardado = localStorage.getItem('ipk_r65_recalibrado');
    if (guardado) historialEvaluaciones = JSON.parse(guardado);
}

function guardarHistorialLocal() {
    localStorage.setItem('ipk_r65_recalibrado', JSON.stringify(historialEvaluaciones));
}

// ========== NUEVA CLASIFICACIÓN CON CORTES MÁS EQUILIBRADOS ==========
function clasificarPaciente(total, soporte) {
    // NUEVOS PUNTAJES DE CORTE (escala 0-100)
    if (total >= 50) {
        return { 
            categoria: "🟢 ALTO BENEFICIO", 
            color: "#00ffd5",
            descripcion: "Excelente candidato a rehabilitación intensiva. Pronóstico muy favorable."
        };
    } else if (total >= 35) {
        return { 
            categoria: "🟡 INTERMEDIO", 
            color: "#ffd966",
            descripcion: "Beneficio probable. Requiere ajustes moderados en el plan terapéutico."
        };
    } else if (total >= 20) {
        return { 
            categoria: "🔴 PREVENTIVO/FRÁGIL", 
            color: "#ffaa66",
            descripcion: "Requiere soporte y seguimiento estrecho. Enfoque en prevención de deterioro."
        };
    } else {
        return { 
            categoria: "⚫ BAJO GLOBAL", 
            color: "#cc99ff",
            descripcion: "Alta complejidad. Optimizar red de apoyo y manejo de comorbilidades antes de rehabilitación."
        };
    }
}

// ========== GENERADOR DE 6 CONSEJOS (actualizado) ==========
function generar6Consejos(total, soporte, noPuedeConsentir, noColaboraCount, perfil) {
    const consejos = [];
    
    // Consejo 1 - Basado en puntaje total (con nuevos rangos)
    if (total >= 50) {
        consejos.push("🚀 ALTO BENEFICIO (≥50 pts): Intensificar rehabilitación con 5-7 sesiones semanales, entrenamiento funcional avanzado y ejercicios aeróbicos de moderada a alta intensidad.");
    } else if (total >= 35) {
        consejos.push("📈 BENEFICIO INTERMEDIO (35-49 pts): Programa de rehabilitación de 3-4 sesiones/semana, progresión gradual de cargas, reevaluación en 4 semanas.");
    } else if (total >= 20) {
        consejos.push("🛡️ PERFIL PREVENTIVO (20-34 pts): Priorizar prevención de caídas, entrenamiento de equilibrio suave y fortalecimiento muscular básico. Aumentar soporte familiar.");
    } else {
        consejos.push("🔍 PERFIL COMPLEJO (<20 pts): Reevaluar en 2 semanas. Enfocar en optimización médica, manejo del dolor y soporte psicosocial antes de rehabilitación intensiva.");
    }
    
    // Consejo 2 - Basado en soporte
    if (soporte >= 12) {
        consejos.push("👨‍👩‍👧‍👦 RED DE APOYO ÓPTIMA: Aprovechar el soporte familiar sólido. Incluir cuidadores en sesiones de entrenamiento y educación continua.");
    } else if (soporte >= 7) {
        consejos.push("🤝 FORTALECER RED DE APOYO: Coordinar con trabajo social para identificar recursos comunitarios y cuidadores alternantes.");
    } else {
        consejos.push("🏠 GESTIÓN DE APOYO URGENTE: Contactar asistente social. Evaluar teleasistencia, internación transitoria o centro de día.");
    }
    
    // Consejo 3 - Capacidad de consentir
    if (noPuedeConsentir) {
        consejos.push("🧠 SIN CAPACIDAD DE CONSENTIR: Trabajar con cuidador principal. Sesiones cortas (15-20 min). Registrar voluntades anticipadas.");
    } else {
        consejos.push("💬 ESTRATEGIA MOTIVACIONAL: Usar entrevista motivacional. Establecer contrato terapéutico con metas personales del paciente.");
    }
    
    // Consejo 4 - Motivación
    if (perfil.motivacionBaja) {
        consejos.push("🎯 BAJA MOTIVACIÓN: Estrategias lúdicas, refuerzos positivos inmediatos, metas muy pequeñas diarias, gamificación.");
    } else if (perfil.motivacionAlta) {
        consejos.push("🔥 ALTA MOTIVACIÓN: Introducir tecnologías asistivas (apps, wearables), autonomía progresiva, autoevaluación semanal.");
    } else {
        consejos.push("⚖️ MOTIVACIÓN VARIABLE: Aumentar gradualmente dificultad para mantener interés sin generar frustración.");
    }
    
    // Consejo 5 - Adherencia y tolerancia
    if (perfil.adherenciaBaja || perfil.toleranciaBaja) {
        consejos.push("⏱️ BAJA ADHERENCIA/TOLERANCIA: Sesiones fraccionadas (10-15 min, 3-4 veces/día). Ejercicios en sedestación. Monitorizar fatiga (Borg 3-4/10).");
    } else if (perfil.adherenciaAlta && perfil.toleranciaAlta) {
        consejos.push("💪 ALTO RENDIMIENTO: Avanzar a ejercicios funcionales complejos (escaleras, levantarse del suelo, marcha comunitaria). Evaluar alta funcional temprana.");
    } else {
        consejos.push("📋 ADHERENCIA MODERADA: Diario de entrenamiento. Reevaluación cada 10 sesiones. Involucrar familiar en recordatorios.");
    }
    
    // Consejo 6 - Seguimiento
    if (total >= 50) {
        consejos.push("🎯 META: Independencia funcional en 4-6 semanas. Derivar a kinesiología ambulatoria. Evaluar cada 2 semanas con SPPB y Timed Up and Go.");
    } else if (total >= 35) {
        consejos.push("📅 PLAN A 8 SEMANAS: Reevaluación intermedia a las 4 semanas. Coordinar con terapia ocupacional si hay déficit asociado.");
    } else {
        consejos.push("🔄 SEGUIMIENTO ESTRECHO: Revaluación en 3 semanas. Considerar interconsulta a geriatría, medicina física o neurología.");
    }
    
    while (consejos.length < 6) {
        consejos.push("📌 TELEMONITOREO: Seguimiento telefónico semanal para reforzar adherencia y detectar complicaciones tempranas.");
    }
    
    return consejos.slice(0, 6);
}

function evaluar() {
    const resDiv = document.getElementById("res");

    // Bloqueos
    if (hemo.value === "no") {
        resDiv.innerHTML = "⛔ PACIENTE NO ESTABLE HEMODINÁMICAMENTE. No se puede evaluar hasta estabilización.";
        return;
    }
    if (acepta.value === "no") {
        resDiv.innerHTML = "❌ El paciente RECHAZA ACTIVAMENTE la intervención. Suspender evaluación.";
        return;
    }

    const noPuedeConsentir = (acepta.value === "no_puede");

    // Cálculo de puntajes (NUEVOS valores)
    let edadVal = parseInt(edad.value) || 0;
    let v1Val = parseInt(v1.value) || 0;
    let v2Val = parseInt(v2.value) || 0;
    let v3Val = parseInt(v3.value) || 0;
    let v4Val = parseInt(v4.value) || 0;
    let j1Val = parseInt(j1.value) || 0;
    let j2Val = parseInt(j2.value) || 0;
    let j3Val = parseInt(j3.value) || 0;
    let j4Val = parseInt(j4.value) || 0;
    let j5Val = parseInt(j5.value) || 0;

    let total = edadVal + v1Val + v2Val + v3Val + v4Val + j1Val + j2Val + j3Val + j4Val + j5Val;
    let soporte = v3Val + j4Val + v4Val;

    // Contar items sin colaboración
    let noColaboraCount = 0;
    const selectoresNoColaboracion = [v4, j2, j3, j5];
    for (let i = 0; i < selectoresNoColaboracion.length; i++) {
        const selectedText = selectoresNoColaboracion[i].options[selectoresNoColaboracion[i].selectedIndex]?.text;
        if (selectedText && selectedText.includes("No puede colaborar")) {
            noColaboraCount++;
        }
    }

    // Perfil para consejos
    const perfil = {
        motivacionBaja: (v4Val === 0 && !document.querySelector('#v4 option:checked')?.text.includes("No puede colaborar")) || j2Val === 0,
        motivacionAlta: v4Val >= 4 || j2Val >= 6,
        adherenciaBaja: j3Val === 0,
        adherenciaAlta: j3Val >= 6,
        toleranciaBaja: j5Val === 0,
        toleranciaAlta: j5Val >= 6
    };

    // Clasificación con nuevos cortes
    const clasificacion = clasificarPaciente(total, soporte);

    // Generar consejos
    const consejos = generar6Consejos(total, soporte, noPuedeConsentir, noColaboraCount, perfil);

    // Observaciones
    let observaciones = "";
    if (noPuedeConsentir) {
        observaciones += "🧠 Paciente NO PUEDE CONSENTIR. Evaluación mediante cuidador. ";
    }
    if (noColaboraCount >= 2) {
        observaciones += `📌 ${noColaboraCount} ítem(s) con "No puede colaborar". Puntuación refleja juicio clínico.`;
    }

    // Guardar
    const data = {
        paciente: paciente.value.trim() || "Anónimo",
        fecha: new Date().toISOString(),
        total: total,
        categoria: clasificacion.categoria,
        descripcion: clasificacion.descripcion,
        soporte: soporte,
        noPuedeConsentir: noPuedeConsentir,
        itemsSinColaboracion: noColaboraCount,
        observaciones: observaciones,
        consejos: consejos
    };
    
    historialEvaluaciones.unshift(data);
    guardarHistorialLocal();

    // Mostrar resultado
    let htmlResultado = `<strong style="color:${clasificacion.color}">${clasificacion.categoria}</strong><br>`;
    htmlResultado += `<span style="font-size:0.9rem;">${clasificacion.descripcion}</span><br><br>`;
    htmlResultado += `🎯 <strong>Puntaje IPK-R65:</strong> ${total} puntos (escala 0-100)<br>`;
    htmlResultado += `🤝 <strong>Puntaje de soporte psicosocial:</strong> ${soporte} pts (máximo 22)<br>`;
    htmlResultado += `<small>🕒 ${new Date().toLocaleString()}</small>`;
    
    if (observaciones) {
        htmlResultado += `<div class="observation-note">📋 ${observaciones}</div>`;
    }
    
    htmlResultado += `<div class="consejos-container">`;
    htmlResultado += `<h4>💡 6 RECOMENDACIONES PERSONALIZADAS</h4>`;
    consejos.forEach((consejo, idx) => {
        htmlResultado += `<div class="consejo-item">
                            <span class="consejo-icon">${idx + 1}️⃣</span>
                            <span>${consejo}</span>
                          </div>`;
    });
    htmlResultado += `</div>`;
    
    resDiv.innerHTML = htmlResultado;
}

function verHistorial() {
    const historialDiv = document.getElementById("historial");
    if (historialEvaluaciones.length === 0) {
        historialDiv.innerHTML = "<div class='card'>📭 Sin evaluaciones previas.</div>";
        return;
    }

    let html = "<h3 class='historial-title'>📜 Historial clínico</h3>";
    historialEvaluaciones.forEach(h => {
        const fechaStr = new Date(h.fecha).toLocaleString();
        let badges = "";
        if (h.noPuedeConsentir) badges += "<span style='background:#ff9800;padding:2px 8px;border-radius:16px;font-size:11px;margin-right:6px;'>⚠️ No puede consentir</span>";
        if (h.itemsSinColaboracion > 0) badges += `<span style='background:#ff5722;padding:2px 8px;border-radius:16px;font-size:11px;'>🚫 ${h.itemsSinColaboracion} sin colaboración</span>`;
        
        html += `
        <div class="card">
            <div><b>🧾 ${escapeHtml(h.paciente)}</b> ${badges}</div>
            <div>📆 ${fechaStr}</div>
            <div><strong>Puntaje: ${h.total}</strong> | ${h.categoria}</div>
            <div>🤝 Soporte: ${h.soporte} pts</div>
        </div>`;
    });
    historialDiv.innerHTML = html;
}

function exportarExcel() {
    if (historialEvaluaciones.length === 0) {
        alert("No hay datos para exportar.");
        return;
    }

    const dataExcel = historialEvaluaciones.map(h => ({
        "Paciente": h.paciente,
        "Fecha": new Date(h.fecha).toLocaleString(),
        "Puntaje total (0-100)": h.total,
        "Categoría": h.categoria,
        "Descripción": h.descripcion,
        "Soporte psicosocial": h.soporte,
        "No puede consentir": h.noPuedeConsentir ? "Sí" : "No",
        "Observaciones": h.observaciones || "",
        "Consejo_1": h.consejos?.[0] || "",
        "Consejo_2": h.consejos?.[1] || "",
        "Consejo_3": h.consejos?.[2] || "",
        "Consejo_4": h.consejos?.[3] || "",
        "Consejo_5": h.consejos?.[4] || "",
        "Consejo_6": h.consejos?.[5] || ""
    }));

    const ws = XLSX.utils.json_to_sheet(dataExcel);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "IPK_R65");
    XLSX.writeFile(wb, `IPK_R65_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
}

function limpiarHistorial() {
    if (confirm("¿Eliminar TODO el historial?")) {
        historialEvaluaciones = [];
        guardarHistorialLocal();
        document.getElementById("historial").innerHTML = "";
        document.getElementById("res").innerHTML = "🧹 Historial eliminado.";
    }
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

cargarHistorialLocal();
window.addEventListener("DOMContentLoaded", () => {
    verHistorial();
});
