<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK-R65 Clínico</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<!-- Excel export -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.container {
    max-width:600px;
    margin:auto;
    background:#0b0b0b;
    padding:20px;
    border-radius:12px;
}

h1 {
    text-align:center;
    color:#00ffd5;
}

label {
    display:block;
    margin-top:14px;
    font-weight:bold;
}

small { color:#ccc; }

select, input, button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}

button {
    background:#00ffd5;
    color:black;
    font-weight:bold;
    margin-top:15px;
    cursor:pointer;
}

.result {
    margin-top:20px;
    padding:15px;
    background:#1c1c1c;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>IPK-R65</h1>

<label>ID Paciente</label>
<input id="paciente" placeholder="Ej: HSJ-001">

<label>¿Paciente hemodinámicamente estable?</label>
<select id="hemo">
<option value="no">No estable</option>
<option value="si">Estable</option>
</select>

<label>¿Acepta intervención kinésica?</label>
<select id="acepta">
<option value="no">No</option>
<option value="si">Sí</option>
</select>

<label>Grupo etario funcional</label>
<select id="edad">
<option value="0">≥65 años</option>
<option value="5"><65 años</option>
</select>

<label>Reserva funcional basal</label>
<select id="v1">
<option value="0">Dependencia severa</option>
<option value="5">Dependencia parcial</option>
<option value="10">Independiente</option>
</select>

<label>Complejidad clínica</label>
<select id="v2">
<option value="0">Alta</option>
<option value="5">Controlada</option>
<option value="10">Baja</option>
</select>

<label>Red de apoyo</label>
<select id="v3">
<option value="0">Sin apoyo</option>
<option value="3">Parcial</option>
<option value="5">Sólida</option>
</select>

<label>Motivación / adherencia</label>
<select id="v4">
<option value="0">Baja</option>
<option value="3">Variable</option>
<option value="5">Alta</option>
</select>

<h3>Juicio clínico kinésico</h3>

<label>Edad funcional</label>
<select id="j1">
<option value="0">Muy baja</option>
<option value="2">Intermedia</option>
<option value="4">Alta</option>
</select>

<label>Motivación observable</label>
<select id="j2">
<option value="0">Nula</option>
<option value="2">Intermitente</option>
<option value="4">Alta</option>
</select>

<label>Adherencia esperable</label>
<select id="j3">
<option value="0">Baja</option>
<option value="2">Parcial</option>
<option value="4">Alta</option>
</select>

<label>Apoyo cuidador</label>
<select id="j4">
<option value="0">Ausente</option>
<option value="2">Irregular</option>
<option value="4">Constante</option>
</select>

<label>Tolerancia al esfuerzo</label>
<select id="j5">
<option value="0">Muy baja</option>
<option value="2">Moderada</option>
<option value="4">Alta</option>
</select>

<button onclick="calc()">Evaluar paciente</button>
<button onclick="verHistorial()">Ver historial</button>
<button onclick="exportarExcel()">Exportar a Excel</button>

<div class="result" id="res"></div>
<div class="result" id="historial"></div>

</div>

<script>

function guardarEvaluacion(data){
    let historial = JSON.parse(localStorage.getItem("ipk_historial")) || [];
    historial.push(data);
    localStorage.setItem("ipk_historial", JSON.stringify(historial));
}

function calc(){

const hemo = document.getElementById("hemo").value;
const acepta = document.getElementById("acepta").value;

if(hemo === "no"){
document.getElementById("res").innerHTML="🚫 Paciente no estable → manejo básico.";
return;
}

if(acepta === "no"){
document.getElementById("res").innerHTML="❌ No acepta intervención → educación.";
return;
}

let j1 = +document.getElementById("j1").value;
let j2 = +document.getElementById("j2").value;
let j3 = +document.getElementById("j3").value;
let j4 = +document.getElementById("j4").value;
let j5 = +document.getElementById("j5").value;

let juicio = j1 + j2 + j3 + j4 + j5;

let edad = +document.getElementById("edad").value;
let v1 = +document.getElementById("v1").value;
let v2 = +document.getElementById("v2").value;
let v3 = +document.getElementById("v3").value;
let v4 = +document.getElementById("v4").value;

let total = edad + v1 + v2 + v3 + v4 + juicio;
let soporte = v3 + j4 + v4;

let interpretacion = "";
let objetivos = "";

if(total >= 40){
interpretacion="🟢 Alto beneficio rehabilitador";
objetivos="Recuperación funcional y entrenamiento progresivo.";
}
else if(total >= 25){
interpretacion="🟡 Beneficio intermedio";
objetivos="Mantención funcional y prevención de deterioro.";
}
else{
if(soporte >= 6){
interpretacion="🔴 Bajo beneficio rehabilitador, alto preventivo";
objetivos="Prevención de complicaciones y manejo básico.";
}
else{
interpretacion="⚫ Bajo beneficio global";
objetivos="Cuidados básicos y confort.";
}
}

let paciente = document.getElementById("paciente").value || "sin-id";

let evaluacion = {
paciente,
fecha: new Date().toISOString(),
total,
interpretacion,
soporte
};

guardarEvaluacion(evaluacion);

document.getElementById("res").innerHTML = `
<b>Puntaje:</b> ${total}<br><br>
<b>${interpretacion}</b><br><br>
<b>Objetivos:</b> ${objetivos}
`;
}

function verHistorial(){
let historial = JSON.parse(localStorage.getItem("ipk_historial")) || [];

if(historial.length === 0){
document.getElementById("historial").innerHTML="Sin registros.";
return;
}

let html = "<h3>Historial</h3>";

historial.slice().reverse().forEach(h=>{
html += `
<div style="padding:10px;margin-bottom:10px;background:#222;border-radius:8px;">
<b>Paciente:</b> ${h.paciente}<br>
<b>Fecha:</b> ${new Date(h.fecha).toLocaleString()}<br>
<b>Puntaje:</b> ${h.total}<br>
<b>${h.interpretacion}</b>
</div>`;
});

document.getElementById("historial").innerHTML = html;
}

function exportarExcel(){

let historial = JSON.parse(localStorage.getItem("ipk_historial")) || [];

if(historial.length === 0){
alert("Sin datos");
return;
}

let data = historial.map(h=>({
Paciente: h.paciente,
Fecha: new Date(h.fecha).toLocaleString(),
Puntaje: h.total,
Interpretacion: h.interpretacion,
Soporte: h.soporte
}));

let ws = XLSX.utils.json_to_sheet(data);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "IPK_R65");

XLSX.writeFile(wb, "IPK_R65_historial.xlsx");
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
