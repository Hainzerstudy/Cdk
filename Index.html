<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK-R65 Cloud</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.container {
    max-width:650px;
    margin:auto;
    background:#0b0b0b;
    padding:20px;
    border-radius:12px;
}

h1 { text-align:center; color:#00ffd5; }

label { display:block; margin-top:12px; font-weight:bold; }

select, input, button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}

button {
    background:#00ffd5;
    color:black;
    font-weight:bold;
    margin-top:12px;
    cursor:pointer;
}

.result {
    margin-top:15px;
    padding:12px;
    background:#1c1c1c;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>IPK-R65 Cloud</h1>

<label>ID Paciente</label>
<input id="paciente" placeholder="Ej: HSJ-001">

<label>Estabilidad hemodinámica</label>
<select id="hemo">
<option value="no">No estable</option>
<option value="si">Estable</option>
</select>

<label>Acepta intervención</label>
<select id="acepta">
<option value="no">No</option>
<option value="si">Sí</option>
</select>

<label>Edad funcional</label>
<select id="edad">
<option value="0">≥65 años</option>
<option value="5"><65 años</option>
</select>

<label>Reserva funcional</label>
<select id="v1">
<option value="0">Severa dependencia</option>
<option value="5">Parcial</option>
<option value="10">Independiente</option>
</select>

<label>Complejidad clínica</label>
<select id="v2">
<option value="0">Alta</option>
<option value="5">Controlada</option>
<option value="10">Baja</option>
</select>

<label>Red de apoyo</label>
<select id="v3">
<option value="0">Sin apoyo</option>
<option value="3">Parcial</option>
<option value="5">Sólida</option>
</select>

<label>Motivación</label>
<select id="v4">
<option value="0">Baja</option>
<option value="3">Variable</option>
<option value="5">Alta</option>
</select>

<h3>Juicio kinésico</h3>

<label>Edad funcional clínica</label>
<select id="j1">
<option value="0">Muy baja</option>
<option value="2">Intermedia</option>
<option value="4">Alta</option>
</select>

<label>Motivación observada</label>
<select id="j2">
<option value="0">Nula</option>
<option value="2">Intermitente</option>
<option value="4">Alta</option>
</select>

<label>Adherencia esperada</label>
<select id="j3">
<option value="0">Baja</option>
<option value="2">Parcial</option>
<option value="4">Alta</option>
</select>

<label>Apoyo cuidador</label>
<select id="j4">
<option value="0">Ausente</option>
<option value="2">Irregular</option>
<option value="4">Constante</option>
</select>

<label>Tolerancia al esfuerzo</label>
<select id="j5">
<option value="0">Muy baja</option>
<option value="2">Moderada</option>
<option value="4">Alta</option>
</select>

<button onclick="calc()">Evaluar y guardar</button>
<button onclick="verHistorial()">Ver historial</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<div class="result" id="res"></div>
<div class="result" id="historial"></div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } 
from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "irat-5-evaluaciones.firebaseapp.com",
  databaseURL: "https://irat-5-evaluaciones-default-rtdb.firebaseio.com",
  projectId: "irat-5-evaluaciones",
  storageBucket: "irat-5-evaluaciones.firebasestorage.app",
  messagingSenderId: "487279274410",
  appId: "1:487279274410:web:146e9c35a0bf795c5423d3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.fb = { collection, addDoc, getDocs, query, orderBy };

</script>

<!-- ================= LOGIC ================= -->
<script>

async function guardarEvaluacion(data){
    try {
        await window.fb.addDoc(
            window.fb.collection(window.db, "evaluaciones_ipk"),
            data
        );
    } catch(e){
        console.error(e);
    }
}

async function calc(){

let hemo = document.getElementById("hemo").value;
let acepta = document.getElementById("acepta").value;

if(hemo === "no"){
document.getElementById("res").innerHTML="🚫 No estable";
return;
}

if(acepta === "no"){
document.getElementById("res").innerHTML="❌ No acepta intervención";
return;
}

let j1 = +document.getElementById("j1").value;
let j2 = +document.getElementById("j2").value;
let j3 = +document.getElementById("j3").value;
let j4 = +document.getElementById("j4").value;
let j5 = +document.getElementById("j5").value;

let juicio = j1+j2+j3+j4+j5;

let total =
+document.getElementById("edad").value +
+document.getElementById("v1").value +
+document.getElementById("v2").value +
+document.getElementById("v3").value +
+document.getElementById("v4").value +
juicio;

let soporte = +document.getElementById("v3").value + j4 + +document.getElementById("v4").value;

let interpretacion = "";
let objetivos = "";

if(total >= 40){
interpretacion="🟢 Alto beneficio rehabilitador";
objetivos="Recuperación funcional";
}
else if(total >= 25){
interpretacion="🟡 Beneficio intermedio";
objetivos="Mantención funcional";
}
else{
interpretacion = soporte >= 6 ?
"🔴 Bajo rehabilitador, alto preventivo" :
"⚫ Bajo beneficio global";
objetivos="Cuidados básicos";
}

let paciente = document.getElementById("paciente").value || "sin-id";

let evaluacion = {
paciente,
fecha: new Date().toISOString(),
total,
interpretacion,
soporte
};

await guardarEvaluacion(evaluacion);

document.getElementById("res").innerHTML =
`<b>${interpretacion}</b><br>Puntaje: ${total}`;
}

async function verHistorial(){

let q = window.fb.query(
window.fb.collection(window.db,"evaluaciones_ipk"),
window.fb.orderBy("fecha","desc")
);

let snap = await window.fb.getDocs(q);

let html = "<h3>Historial Cloud</h3>";

snap.forEach(d=>{
let h = d.data();
html += `
<div class="result">
<b>${h.paciente}</b><br>
${new Date(h.fecha).toLocaleString()}<br>
${h.total} - ${h.interpretacion}
</div>`;
});

document.getElementById("historial").innerHTML = html;
}

async function exportarExcel(){

let snap = await window.fb.getDocs(
window.fb.collection(window.db,"evaluaciones_ipk")
);

let data = snap.docs.map(d=>({
Paciente:d.data().paciente,
Fecha:new Date(d.data().fecha).toLocaleString(),
Puntaje:d.data().total,
Interpretacion:d.data().interpretacion,
Soporte:d.data().soporte
}));

let ws = XLSX.utils.json_to_sheet(data);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "IPK_R65");

XLSX.writeFile(wb,"IPK_R65_cloud.xlsx");
}

</script>

</body>
</html>
