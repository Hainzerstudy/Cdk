<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK-R75 Clínico</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f2027">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.container {
    max-width:600px;
    margin:auto;
    background:#0b0b0b;
    padding:20px;
    border-radius:12px;
}

h1 {
    text-align:center;
    color:#00ffd5;
}

label {
    display:block;
    margin-top:14px;
    font-weight:bold;
}

small {
    color:#ccc;
    display:block;
}

select, button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}

button {
    background:#00ffd5;
    color:black;
    font-weight:bold;
    margin-top:20px;
}

.result {
    margin-top:20px;
    padding:15px;
    background:#1c1c1c;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>IPK-R75</h1>

<label>¿Paciente hemodinámicamente estable?</label>
<small>Filtro de seguridad clínica</small>
<select id="hemo">
<option value="no">No estable</option>
<option value="si">Estable</option>
</select>

<label>¿Acepta intervención kinésica?</label>
<small>Viabilidad terapéutica</small>
<select id="acepta">
<option value="no">No</option>
<option value="si">Sí</option>
</select>

<label>Grupo etario funcional</label>
<select id="edad">
<option value="0">≥75 años (menor reserva)</option>
<option value="5"><75 años (mayor reserva)</option>
</select>

<label>Reserva funcional basal</label>
<select id="v1">
<option value="0">Dependencia severa / fragilidad avanzada</option>
<option value="5">Dependencia parcial</option>
<option value="10">Independiente / robusto</option>
</select>

<label>Complejidad clínica / pronóstico</label>
<select id="v2">
<option value="0">Alta complejidad / baja reversibilidad</option>
<option value="5">Comorbilidades controladas</option>
<option value="10">Baja carga / buena reversibilidad</option>
</select>

<label>Red de apoyo</label>
<select id="v3">
<option value="0">Sin apoyo</option>
<option value="3">Apoyo parcial</option>
<option value="5">Red sólida</option>
</select>

<label>Motivación / adherencia</label>
<select id="v4">
<option value="0">Baja</option>
<option value="3">Variable</option>
<option value="5">Alta</option>
</select>

<h3>Juicio clínico kinésico</h3>

<label>Edad funcional percibida</label>
<select id="j1">
<option value="0">Muy envejecido funcionalmente</option>
<option value="2">Intermedia</option>
<option value="4">Funcionalmente joven</option>
</select>

<label>Motivación observable</label>
<select id="j2">
<option value="0">Nula / resistencia</option>
<option value="2">Intermitente</option>
<option value="4">Alta</option>
</select>

<label>Adherencia esperable</label>
<select id="j3">
<option value="0">Baja probabilidad</option>
<option value="2">Parcial</option>
<option value="4">Alta</option>
</select>

<label>Apoyo cuidador</label>
<select id="j4">
<option value="0">Ausente</option>
<option value="2">Irregular</option>
<option value="4">Constante</option>
</select>

<label>Reversibilidad funcional</label>
<select id="j5">
<option value="0">Escasa</option>
<option value="2">Parcial</option>
<option value="4">Alta</option>
</select>

<button onclick="calc()">Evaluar paciente</button>

<div class="result" id="res"></div>

</div>

<script>
function calc(){

if(hemo.value=="no"){
res.innerHTML="🚫 Paciente no estable → manejo básico, posicionamiento y reevaluación.";
return;
}

if(acepta.value=="no"){
res.innerHTML="❌ Paciente no acepta intervención → educación y cierre kinésico.";
return;
}

let juicio = +j1.value + +j2.value + +j3.value + +j4.value + +j5.value;

let total =
+edad.value +
+v1.value +
+v2.value +
+v3.value +
+v4.value +
juicio;

let interpretacion="";
let objetivos="";

if(total>=40){
interpretacion="🟢 Alta probabilidad de beneficio kinésico";

objetivos=`
<b>Objetivos terapéuticos:</b>
<ul>
<li>Recuperar funcionalidad previa</li>
<li>Mejorar fuerza y capacidad aeróbica</li>
<li>Optimizar independencia en AVD</li>
<li>Prevenir desacondicionamiento</li>
</ul>`;
}

else if(total>=25){
interpretacion="🟡 Beneficio posible condicionado";

objetivos=`
<b>Objetivos terapéuticos:</b>
<ul>
<li>Mantener funcionalidad actual</li>
<li>Prevenir deterioro funcional</li>
<li>Optimizar movilidad básica</li>
<li>Educar en autocuidado</li>
</ul>`;
}

else{
interpretacion="🔴 Bajo beneficio esperado";

objetivos=`
<b>Objetivos terapéuticos:</b>
<ul>
<li>Confort y alivio sintomático</li>
<li>Prevención de complicaciones</li>
<li>Posicionamiento terapéutico</li>
<li>Educación a cuidador</li>
</ul>`;
}

res.innerHTML = `
<b>Puntaje:</b> ${total} / 55<br><br>
<b>${interpretacion}</b><br><br>
${objetivos}
<br>
<i>Usar como apoyo a la decisión clínica.</i>
`;
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
