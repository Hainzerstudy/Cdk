<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK-R65 Hospitalario</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}

.container {
    max-width:700px;
    margin:auto;
    background:#0b0b0b;
    padding:20px;
    border-radius:12px;
}

h1 { text-align:center; color:#00ffd5; }

input, select, button {
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:8px;
    border:none;
}

button {
    background:#00ffd5;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.result {
    margin-top:15px;
    padding:12px;
    background:#1c1c1c;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>IPK-R65 Hospitalario</h1>

<!-- 🔐 LOGIN -->
<h3>Acceso clínico</h3>

<input id="email" placeholder="correo institucional">
<input id="pass" type="password" placeholder="contraseña">

<button onclick="login()">Ingresar</button>
<button onclick="logout()">Salir</button>

<div id="userInfo"></div>

<hr>

<!-- 📊 PACIENTE -->
<h3>Evaluación clínica</h3>

<input id="paciente" placeholder="ID paciente">

<label>Estabilidad hemodinámica</label>
<select id="hemo">
<option value="no">No estable</option>
<option value="si">Estable</option>
</select>

<label>Acepta intervención</label>
<select id="acepta">
<option value="no">No</option>
<option value="si">Sí</option>
</select>

<label>Edad funcional</label>
<select id="edad">
<option value="0">≥65</option>
<option value="5"><65</option>
</select>

<label>Reserva funcional</label>
<select id="v1">
<option value="0">Severa</option>
<option value="5">Parcial</option>
<option value="10">Independiente</option>
</select>

<label>Complejidad</label>
<select id="v2">
<option value="0">Alta</option>
<option value="5">Media</option>
<option value="10">Baja</option>
</select>

<label>Red de apoyo</label>
<select id="v3">
<option value="0">Sin apoyo</option>
<option value="3">Parcial</option>
<option value="5">Fuerte</option>
</select>

<label>Motivación</label>
<select id="v4">
<option value="0">Baja</option>
<option value="3">Variable</option>
<option value="5">Alta</option>
</select>

<h4>Juicio kinésico</h4>

<label>Edad funcional clínica</label>
<select id="j1">
<option value="0">Baja</option>
<option value="2">Media</option>
<option value="4">Alta</option>
</select>

<label>Motivación observada</label>
<select id="j2">
<option value="0">Nula</option>
<option value="2">Parcial</option>
<option value="4">Alta</option>
</select>

<label>Adherencia</label>
<select id="j3">
<option value="0">Baja</option>
<option value="2">Media</option>
<option value="4">Alta</option>
</select>

<label>Apoyo cuidador</label>
<select id="j4">
<option value="0">Ausente</option>
<option value="2">Irregular</option>
<option value="4">Constante</option>
</select>

<label>Tolerancia esfuerzo</label>
<select id="j5">
<option value="0">Baja</option>
<option value="2">Moderada</option>
<option value="4">Alta</option>
</select>

<button onclick="evaluar()">Evaluar y guardar</button>
<button onclick="verHistorial()">Historial clínico</button>
<button onclick="exportarExcel()">Exportar Excel</button>

<div class="result" id="res"></div>
<div class="result" id="historial"></div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { 
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "irat-5-evaluaciones.firebaseapp.com",
projectId: "irat-5-evaluaciones",
storageBucket: "irat-5-evaluaciones.appspot.com",
messagingSenderId: "487279274410",
appId: "1:487279274410:web:146e9c35a0bf795c5423d3"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

window.auth = auth;
window.db = db;
window.fb = { 
signInWithEmailAndPassword,
onAuthStateChanged,
signOut,
collection,
addDoc,
getDocs,
query,
orderBy
};

</script>

<!-- ================= LOGIC ================= -->
<script>

let user = null;

/* 🔐 AUTH */
async function login(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

try{
await window.fb.signInWithEmailAndPassword(window.auth,email,pass);
}catch(e){
alert("Error login");
}
}

async function logout(){
await window.fb.signOut(window.auth);
}

window.fb.onAuthStateChanged(window.auth,(u)=>{
user = u;
document.getElementById("userInfo").innerHTML =
u ? "👤 " + u.email : "Sin sesión";
});

/* 💾 GUARDAR */
async function guardar(data){

if(!user){
alert("Debe iniciar sesión");
return;
}

await window.fb.addDoc(
window.fb.collection(window.db,"evaluaciones_ipk"),
{
...data,
evaluadorUID:user.uid,
evaluadorEmail:user.email
}
);
}

/* 📊 EVALUACIÓN */
async function evaluar(){

let hemo = document.getElementById("hemo").value;
let acepta = document.getElementById("acepta").value;

if(hemo==="no"){
document.getElementById("res").innerHTML="No estable";
return;
}

if(acepta==="no"){
document.getElementById("res").innerHTML="No acepta intervención";
return;
}

let total =
+edad.value + +v1.value + +v2.value + +v3.value + +v4.value +
+j1.value + +j2.value + +j3.value + +j4.value + +j5.value;

let soporte = +v3.value + +j4.value + +v4.value;

let interpretacion =
total>=40 ? "Alto beneficio" :
total>=25 ? "Intermedio" :
soporte>=6 ? "Bajo rehabilitador / preventivo" :
"Bajo global";

let data = {
paciente:paciente.value || "sin-id",
fecha:new Date().toISOString(),
total,
interpretacion,
soporte
};

await guardar(data);

document.getElementById("res").innerHTML =
`<b>${interpretacion}</b><br>Puntaje: ${total}`;
}

/* 📂 HISTORIAL */
async function verHistorial(){

let q = window.fb.query(
window.fb.collection(window.db,"evaluaciones_ipk"),
window.fb.orderBy("fecha","desc")
);

let snap = await window.fb.getDocs(q);

let html = "<h3>Historial clínico</h3>";

snap.forEach(d=>{
let h=d.data();

html+=`
<div class="result">
<b>${h.paciente}</b><br>
${new Date(h.fecha).toLocaleString()}<br>
${h.total} - ${h.interpretacion}
</div>`;
});

document.getElementById("historial").innerHTML = html;
}

/* 📤 EXCEL */
async function exportarExcel(){

let snap = await window.fb.getDocs(
window.fb.collection(window.db,"evaluaciones_ipk")
);

let data = snap.docs.map(d=>({
Paciente:d.data().paciente,
Fecha:new Date(d.data().fecha).toLocaleString(),
Puntaje:d.data().total,
Interpretacion:d.data().interpretacion,
Soporte:d.data().soporte,
Evaluador:d.data().evaluadorEmail
}));

let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"IPK_R65");

XLSX.writeFile(wb,"IPK_R65_hospital.xlsx");
}

</script>

</body>
</html>
