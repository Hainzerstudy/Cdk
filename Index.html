<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK-R75 Clínico</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    padding:20px;
}
.container {
    max-width:600px;
    margin:auto;
    background:#0b0b0b;
    padding:20px;
    border-radius:12px;
}
h1 { text-align:center; color:#00ffd5; }

label { margin-top:15px; display:block; font-weight:bold; }

select,button {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:none;
}

button {
    background:#00ffd5;
    color:black;
    font-weight:bold;
}

.result {
    margin-top:20px;
    padding:15px;
    background:#1c1c1c;
    border-radius:10px;
}
</style>
</head>

<body>
<div class="container">
<h1>IPK-R75 Clínico</h1>

<label>¿Acepta intervención?</label>
<select id="acepta">
<option value="no">Rechaza intervención</option>
<option value="si">Acepta intervención</option>
</select>

<label>Edad</label>
<select id="edad">
<option value="0">≥75 años</option>
<option value="5"><75 años</option>
</select>

<label>Estabilidad hemodinámica</label>
<select id="v1">
<option value="0">Inestable</option>
<option value="5">Estable con límites</option>
<option value="10">Estable</option>
</select>

<label>Reserva funcional</label>
<select id="v2">
<option value="0">Dependiente severo</option>
<option value="5">Dependencia parcial</option>
<option value="10">Independiente</option>
</select>

<label>Complejidad clínica</label>
<select id="v3">
<option value="0">Alta complejidad</option>
<option value="5">Controlada</option>
<option value="10">Baja</option>
</select>

<label>Red de apoyo</label>
<select id="v4">
<option value="0">Ausente</option>
<option value="3">Parcial</option>
<option value="5">Sólida</option>
</select>

<label>Motivación</label>
<select id="v5">
<option value="0">Baja</option>
<option value="3">Variable</option>
<option value="5">Alta</option>
</select>

<h3>Juicio clínico</h3>

<select id="j1"><option value="0">Edad funcional baja</option><option value="2">Media</option><option value="4">Alta</option></select>
<select id="j2"><option value="0">Motivación baja</option><option value="2">Media</option><option value="4">Alta</option></select>
<select id="j3"><option value="0">Adherencia baja</option><option value="2">Media</option><option value="4">Alta</option></select>
<select id="j4"><option value="0">Apoyo nulo</option><option value="2">Parcial</option><option value="4">Alto</option></select>
<select id="j5"><option value="0">No reversible</option><option value="2">Parcial</option><option value="4">Alta reversibilidad</option></select>

<button onclick="calc()">Calcular</button>

<div class="result" id="res"></div>

</div>

<script>
function calc(){

if(acepta.value=="no"){
res.innerHTML="❌ Rechazo → Educación / alta kinésica";
return;
}

let juicio=+j1.value+ +j2.value+ +j3.value+ +j4.value+ +j5.value;

let total=
+edad.value+
+v1.value+
+v2.value+
+v3.value+
+v4.value+
+v5.value+
juicio;

let salida="";

if(total>=52){
salida=`
🅰️ MUY FAVORABLE<br>
Perfil: paciente subagudo con alta reserva<br>
Objetivo: recuperar / optimizar función<br>
Frecuencia: diaria o intensiva<br>
Tiempo: 45–60 min
`;
}
else if(total>=36){
salida=`
🅱️ FAVORABLE<br>
Perfil: potencial funcional conservado<br>
Objetivo: mejorar capacidad y prevenir deterioro<br>
Frecuencia: 3–5 veces/semana<br>
Tiempo: 30–40 min
`;
}
else if(total>=20){
salida=`
🅲 CONDICIONADO<br>
Perfil: reserva limitada<br>
Objetivo: mantener / enlentecer deterioro<br>
Frecuencia: 2–3 veces/semana<br>
Tiempo: 15–20 min
`;
}
else{
salida=`
🅳 DESFAVORABLE<br>
Perfil: bajo potencial funcional<br>
Objetivo: confort, educación, posicionamiento<br>
Frecuencia: eventual<br>
Tiempo: 5–10 min
`;
}

res.innerHTML=`Puntaje: ${total}/65<br><br>${salida}`;
}
</script>

</body>
</html>
